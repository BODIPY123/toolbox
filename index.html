<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的项目中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* 浅色手绘（默认） */
  :root {
    --bg:#fbf7ee; --card:#fffdf7; --ink:#2e2a24; --muted:#8a8377;
    --accent:#e07a5f; --accent2:#3d8b7d; --accent3:#8a6fbf;
    --line:#2e2a24; --chip:#f2ecdd; --shadow:rgba(46,42,36,.9);
    --paper:#f0e9d6;
  }
  /* 深色手绘（黑板/牛皮纸感） */
  [data-theme="dark"] {
    --bg:#23201b; --card:#2c2822; --ink:#f0e9d8; --muted:#a89f8d;
    --accent:#f2a488; --accent2:#7fc7b6; --accent3:#b79ce6;
    --line:#f0e9d8; --chip:#38332b; --shadow:rgba(0,0,0,.6);
    --paper:#312c25;
  }
  body {
    background:var(--bg); color:var(--ink);
    font-family:'Gaegu','Patrick Hand',system-ui,sans-serif;
    min-height:100vh; transition:background .25s,color .25s;
    /* 淡淡的网格纸纹理 */
    background-image:
      linear-gradient(var(--paper) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper) 1px, transparent 1px);
    background-size:26px 26px;
  }

  /* 手绘描边：不规则圆角制造涂鸦感 */
  .sketch { border:2.5px solid var(--line); border-radius:255px 15px 225px 15px/15px 225px 15px 255px; }
  .sketch-sm { border:2px solid var(--line); border-radius:15px 225px 15px 255px/255px 15px 225px 15px; }

  /* 主题切换按钮 */
  #themeToggle {
    position:fixed; top:16px; right:16px; z-index:100;
    background:var(--card); color:var(--ink);
    border:2.5px solid var(--line); border-radius:225px 15px 225px 15px/15px 225px 15px 225px;
    padding:8px 16px; cursor:pointer; font-family:inherit; font-size:16px;
    display:flex; align-items:center; gap:6px; transition:.15s;
    box-shadow:2px 2px 0 var(--shadow);
  }
  #themeToggle:hover { transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--shadow); }
  #themeToggle:active { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--shadow); }

  header { padding:48px 20px 12px; text-align:center; }
  header h1 {
    font-size:42px; font-weight:700; color:var(--ink);
    display:inline-block; position:relative;
  }
  /* 标题下的手绘波浪下划线 */
  header h1::after {
    content:''; display:block; height:8px; margin-top:2px;
    background:no-repeat center/100% 8px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='8' viewBox='0 0 200 8'><path d='M2 5 Q 25 1 50 5 T 100 5 T 150 5 T 198 5' fill='none' stroke='%23e07a5f' stroke-width='2.5' stroke-linecap='round'/></svg>");
  }
  header p { color:var(--muted); margin-top:12px; font-size:18px; }

  .toolbar { max-width:1100px; margin:24px auto; padding:0 20px; display:flex; flex-direction:column; gap:18px; align-items:center; }

  .cats { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; background:var(--card); padding:8px; box-shadow:3px 3px 0 var(--shadow); }
  .cat {
    padding:8px 20px; border:2px solid transparent; background:transparent;
    color:var(--muted); cursor:pointer; font-family:inherit; font-size:18px; font-weight:700;
    transition:.12s; white-space:nowrap; border-radius:15px 225px 15px 225px/225px 15px 225px 15px;
  }
  .cat:hover { color:var(--ink); }
  .cat.active { color:var(--ink); border-color:var(--line); background:var(--chip); }

  .search { width:100%; max-width:520px; position:relative; }
  .search input {
    width:100%; padding:13px 46px 13px 18px; background:var(--card); color:var(--ink);
    font-family:inherit; font-size:18px; outline:none;
    border:2.5px solid var(--line); border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
    box-shadow:2px 2px 0 var(--shadow);
  }
  .search input:focus { border-color:var(--accent); }
  .search input::placeholder { color:var(--muted); }
  .search .ico { position:absolute; right:18px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:18px; }

  .tags { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
  .tag {
    padding:5px 15px; background:transparent; color:var(--muted); cursor:pointer;
    font-family:inherit; font-size:15px; transition:.12s;
    border:2px solid var(--line); border-radius:15px 225px 15px 255px/255px 15px 225px 15px;
  }
  .tag:hover { color:var(--ink); transform:rotate(-1.5deg); }
  .tag.active { background:var(--accent); border-color:var(--line); color:#fff; font-weight:700; }

  .section-title { max-width:1100px; margin:34px auto 0; padding:0 20px; font-size:24px; font-weight:700; display:flex; align-items:center; gap:10px; }
  .section-title .line { flex:1; height:3px; margin-left:6px; background:no-repeat center/100% 6px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='6' viewBox='0 0 300 6'><path d='M2 3 Q 40 0 80 3 T 160 3 T 240 3 T 298 3' fill='none' stroke='%238a8377' stroke-width='2' stroke-linecap='round'/></svg>"); }

  .grid { max-width:1100px; margin:16px auto 40px; padding:0 20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:22px; }

  .card {
    background:var(--card); text-decoration:none; color:inherit; display:flex; flex-direction:column;
    border:2.5px solid var(--line); border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
    overflow:hidden; box-shadow:4px 4px 0 var(--shadow); transition:transform .15s,box-shadow .15s;
  }
  .card:nth-child(even) { border-radius:15px 225px 15px 255px/255px 15px 225px 15px; }
  .card:hover { transform:translate(-2px,-3px) rotate(-.6deg); box-shadow:7px 8px 0 var(--shadow); }
  .thumb { height:118px; display:flex; align-items:center; justify-content:center; font-size:54px; position:relative; border-bottom:2.5px dashed var(--line); }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .badge {
    position:absolute; top:9px; right:9px; background:var(--card); color:var(--ink);
    padding:2px 10px; font-size:13px; font-weight:700;
    border:2px solid var(--line); border-radius:15px 225px 15px 225px/225px 15px 225px 15px;
  }
  .body { padding:14px 16px; flex:1; display:flex; flex-direction:column; gap:7px; }
  .body h3 { font-size:20px; font-weight:700; }
  .body p { font-size:15px; color:var(--muted); line-height:1.45; flex:1; }
  .ctags { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .ctag { font-size:13px; padding:2px 10px; background:var(--chip); color:var(--muted); border:1.5px solid var(--line); border-radius:12px 3px 12px 3px/3px 12px 3px 12px; }

  .empty { grid-column:1/-1; text-align:center; color:var(--muted); padding:44px; font-size:20px; }
  footer { text-align:center; padding:24px; color:var(--muted); font-size:15px; }
  footer a { color:var(--accent); }
</style>
</head>
<body>
<button id="themeToggle"><span id="themeIcon">🌙</span><span id="themeLabel">深色</span></button>

<header>
  <h1>🚀 我的项目中心</h1>
  <p>科研工具、学习资源与自制小游戏合集，点击卡片直接使用</p>
</header>

<div class="toolbar">
  <div class="cats" id="catBar"></div>
  <div class="search">
    <input id="searchInput" type="text" placeholder="搜索名称、描述、标签…" autocomplete="off">
    <span class="ico">🔍</span>
  </div>
  <div class="tags" id="tagBar"></div>
</div>

<div id="content"></div>

<footer>
  共 <span id="count">0</span> 个项目 · 用 ❤ 制作 ·
  <a href="https://github.com/bodipy123" target="_blank">GitHub</a>
</footer>

<script>
/* ============================================================
   【维护区 1】分类配置
============================================================ */
const CATEGORIES = {
  work:  { label:"🛠 工作辅助", action:"打开", color:"#e07a5f", color2:"#f7e6df" },
  study: { label:"📚 学习",     action:"学习", color:"#e0a83f", color2:"#f7edd6" },
  game:  { label:"🎮 游戏",     action:"开玩", color:"#8a6fbf", color2:"#ece4f7" },
};

/* ============================================================
   【维护区 2】项目列表
============================================================ */
const PROJECTS = [
  // ---------- 工作辅助 ----------
  {
    category: "work",
    title: "分析化学工具箱",
    desc: "标准曲线拟合、色谱/质谱速览、光谱数据分析三合一。",
    url: "https://bodipy123.github.io/Spectrum-analysis/",
    icon: "🧪",
    cover: "",
    tags: ["数据分析", "光谱", "色谱", "科研"],
    date: "2024-06-10"
  },
  {
    category: "work",
    title: "荧光定量分析",
    desc: "荧光信号定量计算与数据处理工具。",
    url: "https://bodipy123.github.io/fluorescence-quant/",
    icon: "🔬",
    cover: "",
    tags: ["数据分析", "荧光", "科研"],
    date: "2024-06-01"
  },
  {
    category: "work",
    title: "药物浓度计算器",
    desc: "浓度换算与稀释、配液称取、缓冲液、蛋白核酸定量、混合加标、CAS/结构式查询六合一。",
    url: "https://bodipy123.github.io/chem-calculator/",
    icon: "💊",
    cover: "",
    tags: ["数据分析", "配液", "缓冲液", "科研"],
    date: "2024-06-15"
  },
  {
    category: "work",
    title: "仪器操作流程 SOP",
    desc: "多仪器标准操作流程，逐步打勾、进度按仪器自动保存。含质谱成像 MALDI 篇，后续持续扩展。",
    url: "https://bodipy123.github.io/Instrument-Operation-Manual/",
    icon: "🔬",
    cover: "",
    tags: ["SOP", "仪器", "操作流程", "科研"],
    date: "2024-06-18"
  },

  // ---------- 学习 ----------
  {
    category: "study",
    title: "IRI 缺血再灌注治疗",
    desc: "缺血再灌注损伤（IRI）机制与治疗方案学习资料。",
    url: "https://bodipy123.github.io/IRI-treatment/",
    icon: "🫀",
    cover: "",
    tags: ["IRI", "缺血再灌注", "医学", "科研"],
    date: "2024-06-20"
  },
  {
    category: "study",
    title: "糖链组织分布",
    desc: "糖链在组织中的分布可视化与分析。",
    url: "https://bodipy123.github.io/Glycan-tissue-distribution/",
    icon: "🧬",
    cover: "",
    tags: ["可视化", "糖生物学", "科研"],
    date: "2024-06-02"
  },

  // ---------- 游戏 ----------
  {
    category: "game",
    title: "抽奖模拟",
    desc: "随机抽奖小游戏，试试你的手气。",
    url: "https://bodipy123.github.io/-lottery/",
    icon: "🎰",
    cover: "",
    tags: ["休闲", "随机"],
    date: "2024-05-20"
  },
  {
    category: "game",
    title: "股神模拟器",
    desc: "模拟炒股，低买高卖体验股市沉浮。",
    url: "https://bodipy123.github.io/Stock-God-Simulator/",
    icon: "📈",
    cover: "",
    tags: ["模拟", "经营"],
    date: "2024-05-25"
  },
  {
    category: "game",
    title: "Roguelike RPG",
    desc: "随机地牢探索，每局都是新冒险。",
    url: "https://bodipy123.github.io/Roguelike-rpg/",
    icon: "⚔️",
    cover: "",
    tags: ["RPG", "Roguelike", "冒险"],
    date: "2024-05-28"
  },
  {
    category: "game",
    title: "吸血鬼幸存者 Mini",
    desc: "自动攻击割草生存，升级选强化挑战Boss。",
    url: "https://bodipy123.github.io/Vampire-Survivors-like/",
    icon: "🧛",
    cover: "",
    tags: ["动作", "生存", "手机可玩"],
    date: "2024-06-05"
  },

  // ↓↓↓ 复制这段添加新项目 ↓↓↓
  // {
  //   category: "game",
  //   title: "名称",
  //   desc: "简介",
  //   url: "https://bodipy123.github.io/xxx/",
  //   icon: "🎯",
  //   cover: "",
  //   tags: ["标签1", "标签2"],
  //   date: "2024-06-10"
  // },
];

/* ============ 主题切换 ============ */
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const themeLabel = document.getElementById('themeLabel');
function applyTheme(theme){
  if(theme==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    themeIcon.textContent='☀️'; themeLabel.textContent='浅色';
  }else{
    document.documentElement.removeAttribute('data-theme');
    themeIcon.textContent='🌙'; themeLabel.textContent='深色';
  }
}
let curTheme = localStorage.getItem('hub_theme') || 'light';
applyTheme(curTheme);
themeToggle.onclick = ()=>{
  curTheme = curTheme==='dark' ? 'light' : 'dark';
  localStorage.setItem('hub_theme', curTheme);
  applyTheme(curTheme);
};

/* ============ 渲染逻辑 ============ */
const catBar = document.getElementById('catBar');
const tagBar = document.getElementById('tagBar');
const searchInput = document.getElementById('searchInput');
const content = document.getElementById('content');
const countEl = document.getElementById('count');

const catKeys = Object.keys(CATEGORIES);
let activeCat = 'all';
let activeTag = '全部';
let keyword = '';

function catOf(key){ return CATEGORIES[key] || { label:key, action:'打开', color:'#e07a5f', color2:'#f2ecdd' }; }

function renderCats(){
  catBar.innerHTML = '';
  const list = [['all', { label:'全部' }], ...catKeys.map(k => [k, CATEGORIES[k]])];
  list.forEach(([key, info]) => {
    const btn = document.createElement('button');
    btn.className = 'cat' + (key === activeCat ? ' active' : '');
    btn.textContent = info.label;
    if(key === activeCat && key !== 'all'){
      btn.style.background = catOf(key).color2;
    }
    btn.onclick = () => { activeCat = key; activeTag = '全部'; render(); };
    catBar.appendChild(btn);
  });
}

function currentTagPool(){
  const scope = activeCat === 'all' ? PROJECTS : PROJECTS.filter(p => p.category === activeCat);
  return ['全部', ...new Set(scope.flatMap(p => p.tags || []))];
}

function renderTags(){
  tagBar.innerHTML = '';
  currentTagPool().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag' + (t === activeTag ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { activeTag = t; render(); };
    tagBar.appendChild(btn);
  });
}

function cardHtml(p){
  const c = catOf(p.category);
  const thumb = p.cover
    ? `<img src="${p.cover}" alt="${p.title}">`
    : `<span>${p.icon || '📦'}</span>`;
  return `
    <a class="card" href="${p.url}" target="_blank" rel="noopener">
      <div class="thumb" style="background:${c.color2}">
        ${thumb}<span class="badge" style="color:${c.color}">▶ ${c.action}</span>
      </div>
      <div class="body">
        <h3>${p.title}</h3>
        <p>${p.desc || ''}</p>
        <div class="ctags">${(p.tags || []).map(t => `<span class="ctag">${t}</span>`).join('')}</div>
      </div>
    </a>`;
}

function filterList(){
  const kw = keyword.trim().toLowerCase();
  return PROJECTS.filter(p => {
    const matchCat = activeCat === 'all' || p.category === activeCat;
    const matchTag = activeTag === '全部' || (p.tags || []).includes(activeTag);
    const hay = (p.title + ' ' + p.desc + ' ' + (p.tags || []).join(' ')).toLowerCase();
    const matchKw = !kw || hay.includes(kw);
    return matchCat && matchTag && matchKw;
  }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function render(){
  renderCats();
  renderTags();
  countEl.textContent = PROJECTS.length;
  const list = filterList();

  if(list.length === 0){
    content.innerHTML = '<div class="grid"><div class="empty">没有找到匹配的项目 😕</div></div>';
    return;
  }

  if(activeCat === 'all'){
    let html = '';
    catKeys.forEach(cat => {
      const sub = list.filter(p => p.category === cat);
      if(sub.length === 0) return;
      const c = catOf(cat);
      html += `<div class="section-title" style="color:${c.color}">${c.label}<span class="line"></span></div>`;
      html += `<div class="grid">${sub.map(cardHtml).join('')}</div>`;
    });
    content.innerHTML = html;
  } else {
    content.innerHTML = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
  }
}

searchInput.addEventListener('input', e => { keyword = e.target.value; render(); });

render();
</script>
</body>
</html>
